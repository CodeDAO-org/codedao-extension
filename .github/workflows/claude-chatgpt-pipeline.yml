name: Claude + ChatGPT Collaboration Pipeline

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      claude_request:
        description: 'Request for Claude'
        required: false
        type: string
      chatgpt_request:
        description: 'Request for ChatGPT'
        required: false
        type: string

jobs:
  ai-pipeline:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.title, 'AI:') || contains(github.event.comment.body, '@ai-agents')
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Parse AI Instructions
        id: parse
        run: |
          if [ "${{ github.event_name }}" == "issues" ]; then
            CONTENT="${{ github.event.issue.body }}"
            TITLE="${{ github.event.issue.title }}"
          else
            CONTENT="${{ github.event.comment.body }}"
            TITLE="Comment on issue #${{ github.event.issue.number }}"
          fi
          
          echo "Processing: $TITLE"
          echo "Content: $CONTENT"
          
          if echo "$CONTENT" | grep -i "claude:"; then
            CLAUDE_TASK=$(echo "$CONTENT" | grep -i "claude:" | cut -d':' -f2- | xargs)
            echo "claude_task=$CLAUDE_TASK" >> $GITHUB_OUTPUT
          fi
          
          if echo "$CONTENT" | grep -i "chatgpt:"; then
            CHATGPT_TASK=$(echo "$CONTENT" | grep -i "chatgpt:" | cut -d':' -f2- | xargs)
            echo "chatgpt_task=$CHATGPT_TASK" >> $GITHUB_OUTPUT
          fi

      - name: Execute AI Tasks
        run: |
          echo "🤖 AI Task Execution Started" > ai-pipeline.log
          echo "Timestamp: $(date)" >> ai-pipeline.log
          
          if [ -n "${{ steps.parse.outputs.claude_task }}" ]; then
            echo "Claude Task: ${{ steps.parse.outputs.claude_task }}" >> ai-pipeline.log
            echo "✅ Claude task queued for execution" >> ai-pipeline.log
          fi
          
          if [ -n "${{ steps.parse.outputs.chatgpt_task }}" ]; then
            echo "ChatGPT Task: ${{ steps.parse.outputs.chatgpt_task }}" >> ai-pipeline.log
            echo "✅ ChatGPT task queued for execution" >> ai-pipeline.log
          fi

      - name: Report Results
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const fs = require('fs');
            const logContent = fs.readFileSync('ai-pipeline.log', 'utf8');
            
            const comment = `## 🤖 AI Pipeline Execution Report
            
            **Status:** ✅ Tasks processed successfully
            **Timestamp:** ${new Date().toISOString()}
            
            ### Execution Log:
            \`\`\`
            ${logContent}
            \`\`\`
            
            The AI agents have been notified and will process these tasks autonomously.
            
            ---
            *Generated by CodeDAO AI Collaboration Bot*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
