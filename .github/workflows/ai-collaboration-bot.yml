name: AI Collaboration Bot

on:
  push:
    branches: [main]
  issues:
    types: [opened, closed]
  pull_request:
    types: [opened, closed, synchronize]
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:
    inputs:
      ai_action:
        description: 'AI Action to perform'
        required: true
        type: choice
        options:
          - 'update_dashboard'
          - 'sync_sdk' 
          - 'health_check'
          - 'deploy_fixes'

jobs:
  ai-coordination:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: AI Activity Logger
        id: ai-logger
        run: |
          echo "🤖 AI Collaboration Bot Started" >> ai-activity.log
          echo "Timestamp: $(date)" >> ai-activity.log
          echo "Trigger: ${{ github.event_name }}" >> ai-activity.log
          echo "Repository: ${{ github.repository }}" >> ai-activity.log
          echo "Commit: ${{ github.sha }}" >> ai-activity.log
          echo "---" >> ai-activity.log

      - name: Detect AI Commits
        id: detect-ai
        run: |
          AI_COMMIT=false
          COMMIT_MESSAGE="${{ github.event.head_commit.message }}"
          COMMIT_AUTHOR="${{ github.event.head_commit.author.email }}"
          
          if [[ "$COMMIT_AUTHOR" == *"ai@"* ]] || [[ "$COMMIT_MESSAGE" == *"AI Agent"* ]] || [[ "$COMMIT_MESSAGE" == *"Claude"* ]] || [[ "$COMMIT_MESSAGE" == *"ChatGPT"* ]]; then
            AI_COMMIT=true
            echo "🤖 AI commit detected!" >> ai-activity.log
            echo "Author: $COMMIT_AUTHOR" >> ai-activity.log
            echo "Message: $COMMIT_MESSAGE" >> ai-activity.log
          fi
          
          echo "ai_commit=$AI_COMMIT" >> $GITHUB_OUTPUT

      - name: Update Dashboard Stats
        if: steps.detect-ai.outputs.ai_commit == 'true'
        run: |
          echo "📊 Updating dashboard with AI statistics..." >> ai-activity.log
          
          CLAUDE_COMMITS=$(git log --author="claude" --author="ai@codedao.org" --oneline | wc -l)
          CHATGPT_COMMITS=$(git log --grep="ChatGPT" --grep="chatgpt" --oneline | wc -l)
          TOTAL_AI_COMMITS=$((CLAUDE_COMMITS + CHATGPT_COMMITS))
          
          echo "Claude commits: $CLAUDE_COMMITS" >> ai-activity.log
          echo "ChatGPT commits: $CHATGPT_COMMITS" >> ai-activity.log
          echo "Total AI commits: $TOTAL_AI_COMMITS" >> ai-activity.log

      - name: Health Check Dashboard
        run: |
          echo "🏥 Running dashboard health check..." >> ai-activity.log
          
          if [ -f "dashboard.html" ]; then
            echo "✅ dashboard.html exists" >> ai-activity.log
            
            if grep -q "<!DOCTYPE html>" dashboard.html; then
              echo "✅ Valid HTML structure" >> ai-activity.log
            else
              echo "❌ Invalid HTML structure" >> ai-activity.log
            fi
            
            if grep -q "Claude\|ChatGPT" dashboard.html; then
              echo "✅ AI content found in dashboard" >> ai-activity.log
            else
              echo "⚠️ No AI content found in dashboard" >> ai-activity.log
            fi
          else
            echo "❌ dashboard.html missing!" >> ai-activity.log
          fi

      - name: Auto-fix Common Issues
        run: |
          echo "🔧 Running auto-fixes..." >> ai-activity.log
          
          if [ ! -f ".nojekyll" ]; then
            echo "Adding .nojekyll file" >> ai-activity.log
            touch .nojekyll
            git add .nojekyll
          fi
          
          if [ ! -f "dashboard.html" ] && [ -f "codedao-org.github.io/dashboard.html" ]; then
            echo "Moving dashboard.html to root" >> ai-activity.log
            cp "codedao-org.github.io/dashboard.html" "dashboard.html"
            git add dashboard.html
          fi

      - name: Create AI Status Report
        run: |
          cat > ai-status-report.md << EOF
          # 🤖 AI Collaboration Status Report
          
          **Generated:** $(date)
          **Repository:** ${{ github.repository }}
          **Latest Commit:** ${{ github.sha }}
          **Trigger:** ${{ github.event_name }}
          
          ## 📊 AI Activity Summary
          
          - **Claude Commits:** $(git log --author="claude" --author="ai@codedao.org" --oneline | wc -l)
          - **ChatGPT Commits:** $(git log --grep="ChatGPT" --grep="chatgpt" --oneline | wc -l)
          - **Total AI Actions:** $(wc -l < ai-activity.log)
          - **Dashboard Status:** $([ -f "dashboard.html" ] && echo "✅ Active" || echo "❌ Missing")
          - **Pages Status:** $([ -f ".nojekyll" ] && echo "✅ Enabled" || echo "❌ Disabled")
          
          ## 🔄 Recent Activity
          
          \`\`\`
          $(tail -20 ai-activity.log)
          \`\`\`
          
          ## 🎯 Next Actions
          
          - [ ] Verify dashboard accessibility
          - [ ] Update SDK documentation  
          - [ ] Monitor AI commit patterns
          - [ ] Sync with NPM registry
          
          ---
          *Generated by AI Collaboration Bot*
          EOF

      - name: Commit Bot Activity
        run: |
          git config --local user.email "ai-bot@codedao.org"
          git config --local user.name "CodeDAO AI Bot"
          
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "🤖 AI Bot: Update activity logs and auto-fixes
            
            - Updated AI activity tracking
            - Applied auto-fixes for common issues
            - Generated status report
            
            Triggered by: ${{ github.event_name }}
            Bot run: $(date)"
            
            git push origin main
            echo "✅ Bot changes committed and pushed" >> ai-activity.log
          else
            echo "ℹ️ No changes to commit" >> ai-activity.log
          fi

      - name: Update Dashboard Deployment
        run: |
          echo "🚀 Triggering dashboard deployment..." >> ai-activity.log
          
          curl -X POST \
            -H "Authorization: token ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages/builds"

      - name: AI Communication Hub
        run: |
          echo "📡 AI Communication Hub Active" >> ai-activity.log
          echo "Ready to receive instructions from Claude and ChatGPT" >> ai-activity.log
          echo "Bot capabilities:" >> ai-activity.log
          echo "- ✅ Monitor AI commits" >> ai-activity.log
          echo "- ✅ Auto-fix common issues" >> ai-activity.log
          echo "- ✅ Update dashboard statistics" >> ai-activity.log
          echo "- ✅ Generate status reports" >> ai-activity.log
          echo "- ✅ Trigger deployments" >> ai-activity.log
          echo "- ✅ Commit and push changes" >> ai-activity.log

      - name: Upload Activity Logs
        uses: actions/upload-artifact@v4
        with:
          name: ai-activity-logs
          path: |
            ai-activity.log
            ai-status-report.md
