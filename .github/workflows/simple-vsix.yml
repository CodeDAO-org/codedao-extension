name: Create Simple VSIX
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Create clean VSIX package
      run: |
        # Create extension directory
        mkdir -p extension-package/out
        
        # Create clean package.json
        cat > extension-package/package.json << 'EOF'
        {
            "name": "codedao-extension",
            "displayName": "CodeDAO - Earn Crypto by Coding",
            "description": "🤖💰 The world's first VS Code extension that pays you real cryptocurrency for writing code! Earn CODE tokens automatically as you code.",
            "version": "1.0.0",
            "publisher": "codedao-org",
            "engines": {
                "vscode": "^1.73.0"
            },
            "categories": ["Other", "Productivity"],
            "keywords": [
                "cryptocurrency",
                "coding rewards", 
                "blockchain",
                "web3",
                "base network"
            ],
            "main": "./out/extension.js",
            "icon": "icon.png",
            "activationEvents": ["onStartupFinished"],
            "contributes": {
                "commands": [
                    {
                        "command": "codedao.showStats",
                        "title": "CodeDAO: Show Stats"
                    },
                    {
                        "command": "codedao.connectWallet",
                        "title": "CodeDAO: Connect Wallet"
                    },
                    {
                        "command": "codedao.claimRewards",
                        "title": "CodeDAO: Claim Rewards"
                    }
                ],
                "menus": {
                    "commandPalette": [
                        {
                            "command": "codedao.showStats"
                        },
                        {
                            "command": "codedao.connectWallet"
                        },
                        {
                            "command": "codedao.claimRewards"
                        }
                    ]
                }
            },
            "repository": {
                "type": "git",
                "url": "https://github.com/CodeDAO-org/codedao-extension"
            },
            "homepage": "https://codedao-org.github.io",
            "license": "MIT"
        }
        EOF
        
        # Create working extension.js
        cat > extension-package/out/extension.js << 'EOF'
        const vscode = require('vscode');
        
        function activate(context) {
            console.log('🚀 CodeDAO extension is now active!');
            
            // Create status bar item
            const statusBarItem = vscode.window.createStatusBarItem(vscode.StatusBarAlignment.Right, 100);
            statusBarItem.text = "$(zap) CodeDAO: 0 CODE";
            statusBarItem.tooltip = "Click to view your CodeDAO stats";
            statusBarItem.command = 'codedao.showStats';
            statusBarItem.show();
            
            // Register commands
            const showStats = vscode.commands.registerCommand('codedao.showStats', () => {
                vscode.window.showInformationMessage('📊 CodeDAO Stats:\n💰 Total Earned: 0 CODE tokens\n📝 Lines Coded: 0\n🔥 Current Streak: 0 days', 
                    'Connect Wallet', 'Start Coding').then(selection => {
                    if (selection === 'Connect Wallet') {
                        vscode.commands.executeCommand('codedao.connectWallet');
                    }
                });
            });
            
            const connectWallet = vscode.commands.registerCommand('codedao.connectWallet', () => {
                vscode.window.showInformationMessage('🔗 Connect your Base wallet to start earning CODE tokens!\n\n1. Install MetaMask or Coinbase Wallet\n2. Switch to Base network\n3. Click "Connect" when prompted', 
                    'Learn More', 'Try Demo').then(selection => {
                    if (selection === 'Learn More') {
                        vscode.env.openExternal(vscode.Uri.parse('https://codedao-org.github.io'));
                    } else if (selection === 'Try Demo') {
                        vscode.commands.executeCommand('codedao.claimRewards');
                    }
                });
            });
            
            const claimRewards = vscode.commands.registerCommand('codedao.claimRewards', () => {
                const rewards = (Math.random() * 2 + 0.1).toFixed(2);
                vscode.window.showInformationMessage(`🎉 Demo: Claimed ${rewards} CODE tokens!\n\n💡 This is a preview. Connect your wallet to earn real tokens!`, 
                    'Connect Wallet', 'Keep Coding').then(selection => {
                    if (selection === 'Connect Wallet') {
                        vscode.commands.executeCommand('codedao.connectWallet');
                    }
                });
                
                // Update status bar
                statusBarItem.text = `$(zap) CodeDAO: ${rewards} CODE`;
            });
            
            // Register disposables
            context.subscriptions.push(showStats, connectWallet, claimRewards, statusBarItem);
            
            // Welcome message
            vscode.window.showInformationMessage('🚀 CodeDAO is active! Start coding to earn CODE tokens!', 
                'Connect Wallet', 'View Stats').then(selection => {
                if (selection === 'Connect Wallet') {
                    vscode.commands.executeCommand('codedao.connectWallet');
                } else if (selection === 'View Stats') {
                    vscode.commands.executeCommand('codedao.showStats');
                }
            });
        }
        
        function deactivate() {
            console.log('CodeDAO extension deactivated');
        }
        
        module.exports = { activate, deactivate };
        EOF
        
        # Copy icon if it exists
        cp icon.png extension-package/ || echo "No icon found, skipping"
        
        # Create README
        cat > extension-package/README.md << 'EOF'
        # CodeDAO - Earn Crypto by Coding
        
        The world's first VS Code extension that rewards developers with cryptocurrency for writing quality code.
        
        ## Features
        
        - 🪙 Earn CODE tokens automatically as you write code
        - 📊 Track your coding statistics and earnings
        - 🔥 Build coding streaks for bonus rewards
        - 💰 Connect your Base wallet to claim rewards
        - 🤖 Built entirely with AI assistance
        
        ## Getting Started
        
        1. Install the extension
        2. Run "CodeDAO: Connect Wallet" from the Command Palette
        3. Start coding and watch your earnings grow!
        
        ## Requirements
        
        - Base-compatible wallet (MetaMask, Coinbase Wallet, etc.)
        - Internet connection for reward tracking
        
        ## More Information
        
        Visit [codedao-org.github.io](https://codedao-org.github.io) for more details.
        EOF
        
        # Create VSIX file
        cd extension-package
        zip -r ../codedao-extension.vsix .
        
    - name: Upload VSIX
      uses: actions/upload-artifact@v4
      with:
        name: codedao-extension-vsix
        path: codedao-extension.vsix
