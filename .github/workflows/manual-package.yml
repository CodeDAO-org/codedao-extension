name: Build Extension Package
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '16'
        
    - name: Create manual package
      run: |
        mkdir -p package
        cp -r . package/
        cd package
        rm -rf node_modules .git
        zip -r ../codedao-extension.zip .
        
    - name: Upload extension package
      uses: actions/upload-artifact@v4
      with:
        name: codedao-extension-package
        path: codedao-extension.zip
