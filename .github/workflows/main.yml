name: Build VS Code Extension
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '14'
        
    - name: Install specific vsce version
      run: npm install -g vsce@2.11.0
      
    - name: Package extension
      run: vsce package --no-dependencies --allow-missing-repository --skip-license
      
    - name: Publish to VS Code Marketplace
      run: vsce publish -p ${{ secrets.AZURE_MARKETPLACE_TOKEN }} --no-dependencies --allow-missing-repository --skip-license
