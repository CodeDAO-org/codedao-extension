name: Build Clean Extension
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Create clean extension structure
      run: |
        # Create a clean extension folder
        mkdir clean-extension
        
        # Copy only essential files
        cp package.json clean-extension/
        cp -r src clean-extension/
        cp icon.png clean-extension/ || echo "No icon found"
        cp README.md clean-extension/ || echo "No README found"
        
        # Create minimal out folder with compiled JS
        mkdir -p clean-extension/out
        
        # Convert TypeScript to simple JavaScript manually
        cat > clean-extension/out/extension.js << 'EOF'
        const vscode = require('vscode');
        
        function activate(context) {
            console.log('CodeDAO extension is now active!');
            
            const showStats = vscode.commands.registerCommand('codedao.showStats', () => {
                vscode.window.showInformationMessage('CodeDAO Stats: 0 CODE tokens earned');
            });
            
            const connectWallet = vscode.commands.registerCommand('codedao.connectWallet', () => {
                vscode.window.showInformationMessage('Connect your Base wallet to start earning!');
            });
            
            const claimRewards = vscode.commands.registerCommand('codedao.claimRewards', () => {
                vscode.window.showInformationMessage('Claimed 0.5 CODE tokens! 🎉');
            });
            
            context.subscriptions.push(showStats, connectWallet, claimRewards);
            
            vscode.window.showInformationMessage('🚀 CodeDAO is active! Start coding to earn CODE tokens!');
        }
        
        function deactivate() {}
        
        module.exports = { activate, deactivate };
        EOF
        
        # Package it
        cd clean-extension
        tar -czf ../codedao-clean.tar.gz .
        
    - name: Upload clean package
      uses: actions/upload-artifact@v4
      with:
        name: codedao-clean-extension
        path: codedao-clean.tar.gz
