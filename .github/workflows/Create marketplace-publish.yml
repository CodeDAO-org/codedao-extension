name: Publish VS Code Extension

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '16'  # Node 16 LTS - no undici issues
          
      - run: npm install
      
      - run: npm run compile
      
      - run: npm install -g vsce@2.12.0  # Last version before undici
      
      - run: vsce publish -p ${{ secrets.VSCE_PAT }}
