name: Publish VS Code Extension

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '16'
          
      - run: npm install
      
      - run: npm run compile
      
      # Install the original, unscoped vsce (pre-undici)
      - run: npm install -g vsce@1.103.1
      
      # Verify we got the right package
      - run: vsce --version
      
      - run: vsce publish -p ${{ secrets.VSCE_PAT }}
