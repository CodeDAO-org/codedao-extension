name: Publish VS Code Extension

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '18'  # Web Stream support starts here
          
      - run: npm install
      
      - run: npm run compile
      
      - run: npm install -g vsce@2.14.0
      
      - run: vsce publish -p ${{ secrets.VSCE_PAT }}
